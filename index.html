<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Banco de Horas PIBN</title>
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Banco de Horas">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root {
    --bg:#0f1115; --surface:#1a1d24; --surface-2:#232733; --border:#2e3340;
    --text:#e6e8ec; --muted:#9aa0ac; --accent:#6c8cff; --accent-soft:#2a3354;
    --green:#3ecf8e; --green-soft:#16331f; --amber:#f5b942; --amber-soft:#3a2e10;
    --red:#ff6b6b; --red-soft:#3a1717; --radius:12px;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,#0a1330 0%,#140a38 55%,#1e0f42 100%);
    background-attachment:fixed; min-height:100vh; color:var(--text); font-size:15px; line-height:1.5;
  }
  body::after { content:""; position:fixed; inset:0; background:radial-gradient(ellipse at 50% 22%, transparent 52%, rgba(0,0,0,0.4) 100%); z-index:0; pointer-events:none; }
  main { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:24px; }
  header {
    background:rgba(18,21,30,0.72); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); padding:16px 24px; padding-top:max(16px,env(safe-area-inset-top));
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:10;
  }
  header h1 { font-size:18px; margin:0; display:flex; align-items:center; gap:8px; cursor:pointer; }
  .sync { font-size:12px; color:var(--muted); padding:4px 10px; border:1px solid var(--border); border-radius:20px; white-space:nowrap; }
  .tabs { display:flex; gap:4px; margin-left:auto; flex-wrap:wrap; }
  .tab { padding:8px 14px; border-radius:8px; cursor:pointer; color:var(--muted); border:1px solid transparent; background:none; font-size:14px; }
  .tab:hover { background:var(--surface-2); color:var(--text); }
  .tab.active { background:var(--accent-soft); color:#fff; border-color:var(--accent); }
  /* Menu inicial — vertical */
  .home-menu { display:flex; flex-direction:column; gap:14px; max-width:520px; margin:6vh auto 0; }
  .home-btn { display:flex; flex-direction:row; align-items:center; gap:18px; padding:24px 26px; background:var(--surface); border:1px solid var(--border); border-radius:16px; color:var(--text); cursor:pointer; font-size:18px; font-weight:600; text-align:left; transition:transform .12s,border-color .12s,background .12s; }
  .home-btn:hover { border-color:var(--accent); transform:translateY(-2px); background:var(--surface-2); }
  .home-btn .ico { font-size:34px; line-height:1; flex-shrink:0; }
  .home-btn .sub { display:block; font-size:13px; font-weight:400; color:var(--muted); margin-top:2px; }
  .toolbar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  input,select,textarea { background:var(--surface-2); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:8px; font-size:16px; font-family:inherit; }
  input:focus,select:focus,textarea:focus { outline:none; border-color:var(--accent); }
  .btn { background:var(--accent); color:#fff; border:none; padding:9px 16px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; }
  .btn:hover { filter:brightness(1.1); }
  .btn.secondary { background:var(--surface-2); border:1px solid var(--border); color:var(--text); font-weight:500; }
  .btn.danger { background:var(--red-soft); color:var(--red); border:1px solid var(--red); }
  .btn.small { padding:5px 10px; font-size:13px; }
  .stats { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; flex:1; min-width:150px; }
  .stat .num { font-size:24px; font-weight:700; }
  .stat .lbl { color:var(--muted); font-size:13px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:12px; border-left:4px solid var(--accent); }
  .card-head { display:flex; align-items:flex-start; gap:12px; }
  .card-head .title { font-size:16px; font-weight:600; }
  .card-head .when { color:var(--muted); font-size:13px; margin-top:2px; }
  .card-actions { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; align-items:center; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .chip { background:var(--surface-2); border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:12px; display:inline-flex; align-items:center; gap:6px; }
  .chip.zero { opacity:.45; }
  .chip .dot { width:8px; height:8px; border-radius:50%; }
  .badge { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; display:inline-block; background:var(--accent-soft); color:#cdd7ff; }
  .section-label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin:12px 0 8px; }
  .empty { text-align:center; color:var(--muted); padding:60px 20px; }
  .empty .big { font-size:42px; margin-bottom:8px; }
  .pay-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
  .pay-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .pay-card .nome { font-weight:600; font-size:16px; display:flex; align-items:center; gap:8px; }
  .pay-card .linha { display:flex; justify-content:space-between; font-size:14px; margin-top:8px; color:var(--muted); }
  .pay-card .total { font-size:22px; font-weight:700; color:var(--green); margin-top:10px; }
  .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:14px; flex-shrink:0; }
  /* Calendário */
  .cal-head, .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal-head div { text-align:center; color:var(--muted); font-size:12px; padding:4px 0; }
  .cal-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; background:var(--surface); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:14px; user-select:none; }
  .cal-cell.vazio { background:none; border:none; cursor:default; }
  .cal-cell.on { background:var(--green-soft); border-color:var(--green); color:var(--green); font-weight:700; }
  .cal-cell:not(.vazio):active { transform:scale(.93); }
  /* Modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:flex-start; justify-content:center; z-index:50; overflow-y:auto; padding:40px 16px; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:100%; max-width:620px; padding:24px; }
  .modal h2 { margin:0 0 18px; font-size:18px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:5px; }
  .field input, .field select, .field textarea { width:100%; }
  .row { display:flex; gap:12px; }
  .row .field { flex:1; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
  .func-row { display:grid; grid-template-columns:1fr 90px 90px 90px; gap:8px; align-items:center; padding:8px 0; border-top:1px solid var(--border); }
  .func-row .fn { display:flex; align-items:center; gap:8px; font-size:14px; }
  .func-row input { width:100%; padding:7px 8px; text-align:center; }
  .func-row .cab { color:var(--muted); font-size:12px; text-align:center; }
  .hint { color:var(--muted); font-size:12px; margin-top:4px; }
  @media (max-width:560px){
    .func-row { grid-template-columns:1fr 1fr 1fr; grid-template-areas:"nome nome nome" "e s h"; gap:6px; }
    .func-row .fn { grid-area:nome; }
  }
</style>
</head>
<body>
<header>
  <h1 onclick="navegar('home')" title="Voltar ao início">⏱️ Banco de Horas PIBN</h1>
  <span id="sync" class="sync">conectando…</span>
  <div class="tabs">
    <button class="tab" data-view="registro">⏱️ Horários</button>
    <button class="tab" data-view="agenda">📅 Agenda</button>
    <button class="tab" data-view="funcionarios">👥 Funcionários</button>
  </div>
</header>

<main>
  <!-- INÍCIO (menu vertical) -->
  <div id="view-home">
    <div class="home-menu">
      <button class="home-btn" onclick="navegar('registro')"><span class="ico">⏱️</span><span>Preencher horários<span class="sub">Lançar as horas trabalhadas</span></span></button>
      <button class="home-btn" onclick="navegar('agenda')"><span class="ico">📅</span><span>Agenda<span class="sub">Marcar os dias que cada um pode trabalhar</span></span></button>
      <button class="home-btn" onclick="navegar('funcionarios')"><span class="ico">👥</span><span>Dados dos funcionários<span class="sub">Cadastro, valor/hora e pagamento</span></span></button>
    </div>
  </div>

  <!-- PREENCHER HORÁRIOS -->
  <div id="view-registro" style="display:none">
    <div class="toolbar">
      <select id="mesRegistro" onchange="setMes(this.value)"></select>
      <button class="btn" onclick="openDia()">+ Novo dia</button>
    </div>
    <div class="stats" id="statsRegistro"></div>
    <div id="lista-dias"></div>
  </div>

  <!-- AGENDA / DISPONIBILIDADE -->
  <div id="view-agenda" style="display:none">
    <div id="agenda-conteudo"></div>
  </div>

  <!-- FUNCIONÁRIOS -->
  <div id="view-funcionarios" style="display:none">
    <div class="toolbar">
      <button class="btn" onclick="openFunc()">+ Novo funcionário</button>
      <select id="mesFunc" onchange="setMes(this.value)"></select>
    </div>
    <div id="lista-funcionarios"></div>
  </div>
</main>

<!-- MODAL DIA -->
<div class="overlay" id="overlayDia">
  <div class="modal">
    <h2 id="diaTitulo">Novo dia</h2>
    <input type="hidden" id="dId">
    <div class="row">
      <div class="field"><label>Data</label><input type="date" id="dData" onchange="document.getElementById('dDiaSemana').textContent=diaSemanaPT(this.value)"></div>
      <div class="field"><label>Dia da semana</label><div id="dDiaSemana" style="padding:9px 0; color:var(--muted)">—</div></div>
    </div>
    <div class="field"><label>Evento</label><input type="text" id="dEvento" placeholder="Ex: Culto, Classe A, Ensaio..."></div>
    <div class="field"><label>Observações</label><input type="text" id="dObs" placeholder="Opcional"></div>
    <div class="section-label">Horas por funcionário</div>
    <div class="func-row" style="border-top:none"><div class="fn" style="color:var(--muted);font-size:12px">Funcionário</div><div class="cab">Entrada</div><div class="cab">Saída</div><div class="cab">Horas</div></div>
    <div id="diaFuncRows"></div>
    <div class="hint">As horas são calculadas pela entrada/saída, mas você pode ajustar manualmente.</div>
    <div class="modal-actions">
      <button class="btn danger" id="btnExcluirDia" onclick="excluirDia()" style="margin-right:auto; display:none">Excluir</button>
      <button class="btn secondary" onclick="closeDia()">Cancelar</button>
      <button class="btn" onclick="salvarDia()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL FUNCIONÁRIO -->
<div class="overlay" id="overlayFunc">
  <div class="modal" style="max-width:440px">
    <h2 id="funcTitulo">Novo funcionário</h2>
    <input type="hidden" id="fId">
    <div class="field"><label>Nome</label><input type="text" id="fNome" placeholder="Nome do funcionário"></div>
    <div class="field"><label>Valor por hora (R$)</label><input type="number" id="fValor" step="0.01" min="0" placeholder="35"></div>
    <div class="modal-actions">
      <button class="btn danger" id="btnExcluirFunc" onclick="excluirFunc()" style="margin-right:auto; display:none">Excluir</button>
      <button class="btn secondary" onclick="closeFunc()">Cancelar</button>
      <button class="btn" onclick="salvarFunc()">Salvar</button>
    </div>
  </div>
</div>

<script>
let db = { funcionarios: [], meses: [], disponibilidade: {} };
let mesAtualId = null;
let dispFuncId = null;
let accessCode = localStorage.getItem('bh-code') || '';

/* ---------- Sincronização ---------- */
function authHeaders(extra){ return Object.assign({ 'x-access-code': accessCode }, extra||{}); }
function normalize(d){ return {
  funcionarios: Array.isArray(d&&d.funcionarios)?d.funcionarios:[],
  meses: Array.isArray(d&&d.meses)?d.meses:[],
  disponibilidade: (d&&typeof d.disponibilidade==='object'&&d.disponibilidade)?d.disponibilidade:{}
}; }
function setSync(state){
  const el=document.getElementById('sync');
  const map={ ok:['✓ Sincronizado','var(--green)'], salvando:['Salvando…','var(--amber)'], erro:['Erro ao salvar','var(--red)'], off:['Sem conexão','var(--muted)'], bloqueado:['Código necessário','var(--red)'], conectando:['Conectando…','var(--muted)'] };
  const [txt,cor]=map[state]||map.conectando; el.textContent=txt; el.style.color=cor; el.style.borderColor=cor;
}
function pedirCodigo(msg){ const c=window.prompt(msg||'Digite o código de acesso:'); if(c===null) return false; accessCode=c.trim(); localStorage.setItem('bh-code',accessCode); return true; }
async function carregarDoServidor(){
  setSync('conectando');
  while(true){
    let r;
    try { r=await fetch('/api/data',{headers:authHeaders()}); } catch(e){ setSync('off'); return false; }
    if(r.status===401){ if(!pedirCodigo('Código incorreto ou necessário. Digite o código de acesso:')){ setSync('bloqueado'); return false; } continue; }
    if(!r.ok){ setSync('erro'); return false; }
    db=normalize(await r.json());
    if(!db.funcionarios.length && !db.meses.length){
      try { const seed=await (await fetch('dados-iniciais.json')).json(); db=normalize(seed); await pushAgora(); } catch(e){}
    }
    setSync('ok'); return true;
  }
}
let pushTimer=null, enviando=false, pendente=false;
function save(){ pendente=true; setSync('salvando'); clearTimeout(pushTimer); pushTimer=setTimeout(pushAgora,600); }
async function pushAgora(){
  if(enviando) return; enviando=true; pendente=false;
  try { const r=await fetch('/api/data',{method:'POST',headers:authHeaders({'Content-Type':'application/json'}),body:JSON.stringify(db)}); setSync(r.ok?'ok':'erro'); }
  catch(e){ setSync('off'); }
  enviando=false; if(pendente) pushAgora();
}
async function sincronizarBaixar(){
  if(document.querySelector('.overlay.open')) return;
  if(enviando||pendente) return;
  let r; try { r=await fetch('/api/data',{headers:authHeaders()}); } catch(e){ setSync('off'); return; }
  if(!r.ok) return;
  const novo=normalize(await r.json());
  if(JSON.stringify(novo)!==JSON.stringify(db)){ db=novo; if(!mesById(mesAtualId)) mesAtualId=db.meses[0]?db.meses[0].id:null; renderTudo(); }
  setSync('ok');
}
function renderTudo(){ popularSelectsMes(); renderRegistro(); renderAgenda(); renderFuncionarios(); }
function uid(p){ return (p||'id')+Date.now().toString(36)+Math.floor(Math.random()*1e6).toString(36); }

/* ---------- Helpers ---------- */
function esc(s){ return (s==null?'':(''+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function mesById(id){ return db.meses.find(m=>m.id===id); }
function funcById(id){ return db.funcionarios.find(f=>f.id===id); }
function parseHM(s){ if(!s) return null; const m=(''+s).match(/^(\d{1,2}):(\d{2})$/); if(!m) return null; return (+m[1])+(+m[2])/60; }
function horasEntre(e,s){ const a=parseHM(e), b=parseHM(s); if(a==null||b==null) return null; let h=b-a; if(h<0) h+=24; return Math.round(h*10000)/10000; }
function fmtHoras(dec){ dec=+dec||0; const neg=dec<0; dec=Math.abs(dec); const h=Math.floor(dec); const m=Math.round((dec-h)*60); let r=m?`${h}h${String(m).padStart(2,'0')}`:`${h}h`; return (neg?'-':'')+r; }
function money(v){ return (+v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtData(iso){ if(!iso) return 'Sem data'; const [y,m,d]=iso.split('-'); const dias=['dom','seg','ter','qua','qui','sex','sáb']; const dt=new Date(iso+'T00:00:00'); return `${dias[dt.getDay()]} ${d}/${m}/${y}`; }
function diaSemanaPT(iso){ if(!iso) return '—'; const dias=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado']; const dt=new Date(iso+'T00:00:00'); return dias[dt.getDay()]; }
function iniciais(n){ const p=(n||'').trim().split(/\s+/); return ((p[0]||'?')[0]+(p.length>1?p[p.length-1][0]:'')).toUpperCase(); }
function corFunc(id){ const cores={nathan:'#6c8cff',maycon:'#3ecf8e',daniel:'#f5b942',arthur:'#c084fc'}; if(cores[id]) return cores[id]; let h=0; for(const c of (id||'')) h=(h*31+c.charCodeAt(0))%360; return `hsl(${h},55%,55%)`; }
function regDe(d,fid){ return (d.reg&&d.reg[fid])||{entrada:'',saida:'',horas:0}; }
function horasFuncMes(mes,fid){ return (mes.dias||[]).reduce((s,d)=>s+(+regDe(d,fid).horas||0),0); }
function horasDia(d){ return db.funcionarios.reduce((s,f)=>s+(+regDe(d,f.id).horas||0),0); }
function totalPagarMes(mes){ return db.funcionarios.reduce((s,f)=>s+horasFuncMes(mes,f.id)*(+f.valorHora||0),0); }

/* ---------- Navegação ---------- */
function navegar(v){
  ['home','registro','agenda','funcionarios'].forEach(n=>{ const el=document.getElementById('view-'+n); if(el) el.style.display=(n===v)?'':'none'; });
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.view===v));
  if(v==='registro') renderRegistro();
  if(v==='agenda') renderAgenda();
  if(v==='funcionarios') renderFuncionarios();
  window.scrollTo(0,0);
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>navegar(t.dataset.view));
function popularSelectsMes(){
  if(!mesById(mesAtualId)) mesAtualId = db.meses.length? db.meses[0].id : null;
  const opts = db.meses.map(m=>`<option value="${m.id}" ${m.id===mesAtualId?'selected':''}>${esc(m.nome)}</option>`).join('');
  ['mesRegistro','mesFunc'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=opts; });
}
function setMes(id){ mesAtualId=id; popularSelectsMes(); renderRegistro(); renderFuncionarios(); renderAgenda(); }

/* ---------- Preencher horários (Registro) ---------- */
function renderRegistro(){
  const mes=mesById(mesAtualId);
  const stats=document.getElementById('statsRegistro');
  const lista=document.getElementById('lista-dias');
  if(!mes){ stats.innerHTML=''; lista.innerHTML='<div class="empty"><div class="big">📅</div>Nenhum mês cadastrado.</div>'; return; }
  const totHoras=(mes.dias||[]).reduce((s,d)=>s+horasDia(d),0);
  stats.innerHTML=`
    <div class="stat"><div class="num">${(mes.dias||[]).length}</div><div class="lbl">Dias registrados</div></div>
    <div class="stat"><div class="num" style="color:var(--accent)">${fmtHoras(totHoras)}</div><div class="lbl">Total de horas</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${money(totalPagarMes(mes))}</div><div class="lbl">Total a pagar</div></div>`;
  const dias=(mes.dias||[]).slice().sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  if(!dias.length){ lista.innerHTML='<div class="empty"><div class="big">🗓️</div>Nenhum dia neste mês.<br>Clique em <b>+ Novo dia</b>.</div>'; return; }
  lista.innerHTML=dias.map(d=>{
    const chips=db.funcionarios.map(f=>{ const h=+regDe(d,f.id).horas||0; return `<span class="chip ${h?'':'zero'}"><span class="dot" style="background:${corFunc(f.id)}"></span>${esc(f.nome)}: ${h?fmtHoras(h):'—'}</span>`; }).join('');
    return `<div class="card">
      <div class="card-head">
        <div style="flex:1; min-width:0;">
          <div class="title">${esc(d.evento)||'(sem evento)'}</div>
          <div class="when">📅 ${fmtData(d.data)} · ${esc(d.diaSemana||diaSemanaPT(d.data))}</div>
        </div>
        <div class="card-actions">
          <span class="badge">${fmtHoras(horasDia(d))}</span>
          <button class="btn secondary small" onclick="openDia('${d.id}')">Editar</button>
        </div>
      </div>
      ${d.obs?`<div style="color:var(--muted);font-size:13px;margin-top:8px">📝 ${esc(d.obs)}</div>`:''}
      <div class="chips">${chips}</div>
    </div>`;
  }).join('');
}

/* ---------- Modal Dia ---------- */
function buildDiaRows(reg){
  document.getElementById('diaFuncRows').innerHTML = db.funcionarios.map(f=>{
    const r=(reg&&reg[f.id])||{entrada:'',saida:'',horas:0};
    return `<div class="func-row">
      <div class="fn"><span class="avatar" style="width:26px;height:26px;font-size:12px;background:${corFunc(f.id)}">${esc(iniciais(f.nome))}</span>${esc(f.nome)}</div>
      <input type="time" id="ent-${f.id}" value="${esc(r.entrada||'')}" oninput="recalcHoras('${f.id}')">
      <input type="time" id="sai-${f.id}" value="${esc(r.saida||'')}" oninput="recalcHoras('${f.id}')">
      <input type="number" id="hor-${f.id}" step="0.01" min="0" value="${r.horas?(+r.horas):''}" placeholder="0">
    </div>`;
  }).join('');
}
function recalcHoras(fid){
  const e=document.getElementById('ent-'+fid).value, s=document.getElementById('sai-'+fid).value;
  const h=horasEntre(e,s);
  if(h!=null) document.getElementById('hor-'+fid).value = Math.round(h*100)/100;
}
function openDia(id){
  const mes=mesById(mesAtualId);
  if(!mes){ alert('Cadastre/selecione um mês primeiro.'); return; }
  let dia=null;
  if(id) dia=(mes.dias||[]).find(x=>x.id===id);
  document.getElementById('diaTitulo').textContent = dia?'Editar dia':'Novo dia';
  document.getElementById('dId').value = dia?dia.id:'';
  document.getElementById('dData').value = dia?dia.data:'';
  document.getElementById('dDiaSemana').textContent = dia?(dia.diaSemana||diaSemanaPT(dia.data)):'—';
  document.getElementById('dEvento').value = dia?(dia.evento||''):'';
  document.getElementById('dObs').value = dia?(dia.obs||''):'';
  buildDiaRows(dia?dia.reg:null);
  document.getElementById('btnExcluirDia').style.display = dia?'':'none';
  document.getElementById('overlayDia').classList.add('open');
}
function closeDia(){ document.getElementById('overlayDia').classList.remove('open'); }
document.getElementById('overlayDia').addEventListener('click',e=>{ if(e.target.id==='overlayDia') closeDia(); });
function salvarDia(){
  const mes=mesById(mesAtualId); if(!mes) return;
  const data=document.getElementById('dData').value;
  if(!data){ alert('Escolha a data.'); return; }
  const reg={};
  db.funcionarios.forEach(f=>{
    const entrada=document.getElementById('ent-'+f.id).value;
    const saida=document.getElementById('sai-'+f.id).value;
    let horas=parseFloat(document.getElementById('hor-'+f.id).value);
    if(isNaN(horas)){ const h=horasEntre(entrada,saida); horas=h!=null?h:0; }
    reg[f.id]={ entrada, saida, horas: Math.round(horas*10000)/10000 };
  });
  const obj={ data, diaSemana:diaSemanaPT(data), evento:document.getElementById('dEvento').value.trim(), obs:document.getElementById('dObs').value.trim(), reg };
  const id=document.getElementById('dId').value;
  if(!mes.dias) mes.dias=[];
  if(id){ const d=mes.dias.find(x=>x.id===id); Object.assign(d,obj); }
  else { obj.id=uid('d'); mes.dias.push(obj); }
  save(); closeDia(); renderRegistro(); renderFuncionarios();
}
function excluirDia(){
  const mes=mesById(mesAtualId); const id=document.getElementById('dId').value;
  if(!confirm('Excluir este dia?')) return;
  mes.dias=(mes.dias||[]).filter(x=>x.id!==id);
  save(); closeDia(); renderRegistro(); renderFuncionarios();
}

/* ---------- Agenda / Disponibilidade ---------- */
const MESES_PT={janeiro:1,fevereiro:2,'março':3,marco:3,abril:4,maio:5,junho:6,julho:7,agosto:8,setembro:9,outubro:10,novembro:11,dezembro:12};
function mesAnoDe(mes){ if(mes.dias&&mes.dias[0]&&mes.dias[0].data){ const p=mes.dias[0].data.split('-'); return {ano:+p[0],mes:+p[1]}; } const t=(mes.nome||'').toLowerCase().split(/\s+/); return {ano:+(t[1]||2026), mes:(MESES_PT[t[0]]||1)}; }
function dispDe(fid){ if(!db.disponibilidade[fid]) db.disponibilidade[fid]={}; return db.disponibilidade[fid]; }
function disponivel(fid,iso){ return !!(db.disponibilidade[fid]&&db.disponibilidade[fid][iso]); }
function toggleDisp(fid,iso){ const m=dispDe(fid); if(m[iso]) delete m[iso]; else m[iso]=true; save(); renderAgenda(); }
function renderAgenda(){
  const cont=document.getElementById('agenda-conteudo');
  if(!db.funcionarios.length){ cont.innerHTML='<div class="empty"><div class="big">👥</div>Cadastre um funcionário primeiro.</div>'; return; }
  if(!db.meses.length){ cont.innerHTML='<div class="empty"><div class="big">📅</div>Nenhum mês cadastrado.</div>'; return; }
  if(!funcById(dispFuncId)) dispFuncId=db.funcionarios[0].id;
  if(!mesById(mesAtualId)) mesAtualId=db.meses[0].id;
  const mes=mesById(mesAtualId); const f=funcById(dispFuncId);
  const funcOpts=db.funcionarios.map(x=>`<option value="${x.id}" ${x.id===dispFuncId?'selected':''}>${esc(x.nome)}</option>`).join('');
  const mesOpts=db.meses.map(x=>`<option value="${x.id}" ${x.id===mesAtualId?'selected':''}>${esc(x.nome)}</option>`).join('');
  const {ano,mes:mm}=mesAnoDe(mes);
  const offset=new Date(ano,mm-1,1).getDay();
  const nd=new Date(ano,mm,0).getDate();
  let cells=''; for(let i=0;i<offset;i++) cells+='<div class="cal-cell vazio"></div>';
  let qtd=0;
  for(let d=1;d<=nd;d++){ const iso=`${ano}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const on=disponivel(dispFuncId,iso); if(on) qtd++; cells+=`<div class="cal-cell ${on?'on':''}" onclick="toggleDisp('${dispFuncId}','${iso}')">${d}</div>`; }
  const head=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(x=>`<div>${x}</div>`).join('');
  cont.innerHTML=`
    <div class="toolbar">
      <select onchange="dispFuncId=this.value; renderAgenda()">${funcOpts}</select>
      <select onchange="setMes(this.value)">${mesOpts}</select>
    </div>
    <div class="card" style="border-left-color:${corFunc(f.id)}">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="avatar" style="background:${corFunc(f.id)}">${esc(iniciais(f.nome))}</span>
        <div><b>${esc(f.nome)}</b><div class="hint" style="margin:2px 0 0">Toque nos dias que pode trabalhar — <b style="color:var(--green)">${qtd} dia(s)</b> em ${esc(mes.nome)}</div></div>
      </div>
    </div>
    <div class="cal-head">${head}</div>
    <div class="cal-grid">${cells}</div>`;
}

/* ---------- Funcionários (+ pagamento) ---------- */
function openFunc(id){
  let f=null; if(id) f=funcById(id);
  document.getElementById('funcTitulo').textContent=f?'Editar funcionário':'Novo funcionário';
  document.getElementById('fId').value=f?f.id:'';
  document.getElementById('fNome').value=f?f.nome:'';
  document.getElementById('fValor').value=f?f.valorHora:'';
  document.getElementById('btnExcluirFunc').style.display=f?'':'none';
  document.getElementById('overlayFunc').classList.add('open');
  setTimeout(()=>document.getElementById('fNome').focus(),50);
}
function closeFunc(){ document.getElementById('overlayFunc').classList.remove('open'); }
document.getElementById('overlayFunc').addEventListener('click',e=>{ if(e.target.id==='overlayFunc') closeFunc(); });
function salvarFunc(){
  const nome=document.getElementById('fNome').value.trim();
  if(!nome){ alert('Digite o nome.'); return; }
  const valor=parseFloat(document.getElementById('fValor').value)||0;
  const id=document.getElementById('fId').value;
  if(id){ const f=funcById(id); f.nome=nome; f.valorHora=valor; }
  else { db.funcionarios.push({ id:uid('f'), nome, valorHora:valor }); }
  save(); closeFunc(); renderTudo();
}
function excluirFunc(){
  const id=document.getElementById('fId').value;
  if(!confirm('Excluir este funcionário? As horas dele nos registros deixam de ser contabilizadas.')) return;
  db.funcionarios=db.funcionarios.filter(f=>f.id!==id);
  save(); closeFunc(); renderTudo();
}
function renderFuncionarios(){
  const el=document.getElementById('lista-funcionarios');
  if(!db.funcionarios.length){ el.innerHTML='<div class="empty"><div class="big">👥</div>Nenhum funcionário.<br>Clique em <b>+ Novo funcionário</b>.</div>'; return; }
  const mes=mesById(mesAtualId); const nomeMes=mes?mes.nome:'';
  el.innerHTML='<div class="pay-grid">'+db.funcionarios.map(f=>{
    const hMes=mes?horasFuncMes(mes,f.id):0; const pagar=hMes*(+f.valorHora||0);
    let hAno=0; db.meses.forEach(m=>hAno+=horasFuncMes(m,f.id));
    return `<div class="pay-card">
      <div class="nome"><span class="avatar" style="background:${corFunc(f.id)}">${esc(iniciais(f.nome))}</span>${esc(f.nome)}</div>
      <div class="linha"><span>Valor/hora</span><b style="color:var(--text)">${money(f.valorHora)}</b></div>
      <div class="linha"><span>Horas em ${esc(nomeMes)}</span><b style="color:var(--text)">${fmtHoras(hMes)}</b></div>
      <div class="linha"><span>Horas no ano</span><b style="color:var(--text)">${fmtHoras(hAno)}</b></div>
      <div class="linha" style="margin-top:6px"><span>A pagar em ${esc(nomeMes)}</span><b class="total" style="margin:0">${money(pagar)}</b></div>
      <div style="margin-top:12px"><button class="btn secondary small" onclick="openFunc('${f.id}')">Editar</button></div>
    </div>`;
  }).join('')+'</div>';
}

/* ---------- Init ---------- */
(async function boot(){
  const ok=await carregarDoServidor();
  if(db.meses.length) mesAtualId=db.meses[0].id;
  if(db.funcionarios.length) dispFuncId=db.funcionarios[0].id;
  renderTudo();
  if(ok) setInterval(sincronizarBaixar,8000);
})();
</script>
</body>
